name: CI Tests and Security Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports: ['27017:27017']
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\" || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm ci

      - name: Lint Backend Code
        working-directory: backend
        run: npm run lint

      - name: Run Backend Tests
        working-directory: backend
        env:
          MONGODB_URI: mongodb://localhost:27017/sms_test
          JWT_SECRET: test-secret-min-32-chars-long-test
          JWT_REFRESH_SECRET: test-refresh-secret-min-32-chars-long-test
        run: npm test

      - name: Generate Coverage Report
        working-directory: backend
        run: npm run test:coverage
        continue-on-error: true

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage/lcov.info
          flags: backend
          fail_ci_if_error: false

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint Frontend Code
        working-directory: frontend
        run: npm run lint

      - name: Run Frontend Tests
        working-directory: frontend
        run: npm test

      - name: Build Production Frontend
        working-directory: frontend
        run: npm run build

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          flags: frontend
          fail_ci_if_error: false

  security-scan:
    name: Security & Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy Results to GitHub
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Check Dependencies (Backend)
        working-directory: backend
        run: npm audit --production
        continue-on-error: true

      - name: Check Dependencies (Frontend)
        working-directory: frontend
        run: npm audit --production
        continue-on-error: true

  build-validation:
    name: Build Validation
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, security-scan]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate Backend Build
        working-directory: backend
        run: |
          npm ci
          npm run build
          ls -la dist/

      - name: Validate Frontend Build
        working-directory: frontend
        run: |
          npm ci
          npm run build
          ls -la dist/

      - name: Check Docker Build (Backend)
        run: docker build -t sms-backend:test ./backend --no-cache

      - name: Check Docker Build (Frontend)
        run: docker build -t sms-frontend:test ./frontend --no-cache

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, security-scan, build-validation]
    if: always()
    steps:
      - name: Report Test Results
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- Backend Tests: ${{ needs.backend-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend Tests: ${{ needs.frontend-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Scan: ${{ needs.security-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build Validation: ${{ needs.build-validation.result }}" >> $GITHUB_STEP_SUMMARY
