name: Deploy to Multiple Platforms

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'render'
        type: choice
        options:
          - render
          - railway
          - kubernetes
          - all

jobs:
  build-and-publish:
    name: Build and Publish Docker Images
    runs-on: ubuntu-latest
    outputs:
      docker-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/sms
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Backend
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ secrets.DOCKERHUB_USERNAME != '' }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sms-backend:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ secrets.DOCKERHUB_USERNAME != '' }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sms-frontend:${{ github.sha }}
          build-args: VITE_API_URL=/api/v1
          labels: ${{ steps.meta.outputs.labels }}

  deploy-render:
    name: Deploy to Render
    needs: build-and-publish
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.environment == 'render' || github.event.inputs.environment == 'all'))
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
          api-token: ${{ secrets.RENDER_API_TOKEN }}
          github-token: ${{ github.token }}

      - name: Wait for Render Deployment
        run: |
          echo "Render deployment initiated. Monitor at https://dashboard.render.com"
          sleep 30

      - name: Health Check Render
        run: |
          for i in {1..10}; do
            if curl -f https://sms-backend.onrender.com/health; then
              echo "✓ Render deployment healthy"
              exit 0
            fi
            echo "Attempt $i/10 - waiting for deployment..."
            sleep 10
          done
          exit 1

  deploy-railway:
    name: Deploy to Railway
    needs: build-and-publish
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.environment == 'railway' || github.event.inputs.environment == 'all'))
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy Backend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service backend \
            --environment production

      - name: Deploy Frontend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service frontend \
            --environment production

      - name: Get Railway Deployment Status
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway logs --service backend --environment production

  deploy-kubernetes:
    name: Deploy to Kubernetes
    needs: build-and-publish
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.environment == 'kubernetes' || github.event.inputs.environment == 'all'))
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          kubectl cluster-info

      - name: Update Docker images in Kubernetes manifests
        run: |
          sed -i "s|thrinesh1906/sms-backend:.*|${{ secrets.DOCKERHUB_USERNAME }}/sms-backend:${{ github.sha }}|g" k8s/*.yaml helm/*/values.yaml
          sed -i "s|thrinesh1906/sms-frontend:.*|${{ secrets.DOCKERHUB_USERNAME }}/sms-frontend:${{ github.sha }}|g" k8s/*.yaml helm/*/values.yaml

      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secrets.yaml
          kubectl apply -f k8s/

      - name: Or Deploy with Helm
        run: |
          helm repo add stable https://charts.helm.sh/stable
          helm upgrade --install sms ./helm/student-mgmt \
            -n sms \
            --create-namespace \
            --set backend.image.tag=${{ github.sha }} \
            --set frontend.image.tag=${{ github.sha }}

      - name: Wait for Kubernetes Rollout
        run: |
          kubectl rollout status deployment/sms-backend -n sms --timeout=5m
          kubectl rollout status deployment/sms-frontend -n sms --timeout=5m

      - name: Health Check Kubernetes
        run: |
          kubectl get pods -n sms
          kubectl get svc -n sms

  notification:
    name: Send Deployment Notification
    runs-on: ubuntu-latest
    needs: [deploy-render, deploy-railway, deploy-kubernetes]
    if: always()
    steps:
      - name: Determine Status
        id: status
        run: |
          if [ "${{ needs.deploy-render.result }}" = "success" ] || \
             [ "${{ needs.deploy-railway.result }}" = "success" ] || \
             [ "${{ needs.deploy-kubernetes.result }}" = "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

      - name: Slack Notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ steps.status.outputs.status }}
          text: |
            Deployment Status:
            Render: ${{ needs.deploy-render.result }}
            Railway: ${{ needs.deploy-railway.result }}
            Kubernetes: ${{ needs.deploy-kubernetes.result }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
