# Railway.app Configuration

[environments.production]
name = "Production"
region = "us-west"

[services.backend]
buildCommand = "cd backend && npm install && npm run build"
startCommand = "cd backend && npm start"
envSourceType = "dotenv"
envSourcePath = "backend/.env.production"

[services.frontend]
buildCommand = "cd frontend && npm install && npm run build"
startCommand = "cd frontend && npm run preview -- --host 0.0.0.0"
envSourceType = "dotenv"
envSourcePath = "frontend/.env.production"

# Database configurations
[plugins.mongodb]
version = "7"
database = "student_management"
username = "admin"
persistence = true
storage_size_gb = 10

[plugins.redis]
version = "7"
persistence = true
storage_size_gb = 2

# Service ports
[services.backend.ports]
service_port = 5000

[services.frontend.ports]
service_port = 5173
