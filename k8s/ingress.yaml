apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sms-ingress
  namespace: sms
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - sms.example.com
      secretName: sms-tls
  rules:
    - host: sms.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: sms-backend
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sms-frontend
                port:
                  number: 80
