apiVersion: apps/v1
kind: Deployment
metadata:
  name: sms-nginx
  namespace: sms
  labels:
    app: sms-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sms-nginx
  template:
    metadata:
      labels:
        app: sms-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: nginx-config
          configMap:
            name: sms-nginx-config

---
apiVersion: v1
kind: Service
metadata:
  name: sms-nginx
  namespace: sms
spec:
  selector:
    app: sms-nginx
  ports:
    - port: 80
      targetPort: 80
  type: NodePort

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sms-nginx-config
  namespace: sms
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        sendfile on;
        keepalive_timeout 65;
        gzip on;
        gzip_types text/plain text/css application/json application/javascript;

        upstream backend {
            server sms-backend:5000 max_fails=3 fail_timeout=30s;
        }

        upstream frontend {
            server sms-frontend:80;
        }

        server {
            listen 80;
            server_name _;

            location /health {
                access_log off;
                return 200 'ok';
                add_header Content-Type text/plain;
            }

            location /api/ {
                proxy_pass http://backend;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            location /metrics {
                proxy_pass http://backend;
            }

            location / {
                proxy_pass http://frontend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }
        }
    }
