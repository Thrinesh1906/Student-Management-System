apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: student-management-system
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/yourusername/student-management-system.git
    targetRevision: main
    path: helm/student-mgmt
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: sms
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
