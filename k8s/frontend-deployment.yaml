apiVersion: apps/v1
kind: Deployment
metadata:
  name: sms-frontend
  namespace: sms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sms-frontend
  template:
    metadata:
      labels:
        app: sms-frontend
    spec:
      containers:
        - name: frontend
          image: thrinesh1906/sms-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

---
apiVersion: v1
kind: Service
metadata:
  name: sms-frontend
  namespace: sms
spec:
  selector:
    app: sms-frontend
  ports:
    - port: 80
      targetPort: 80
