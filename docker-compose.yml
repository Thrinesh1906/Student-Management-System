services:
  mongodb:
    image: mongo:7
    container_name: sms-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    networks:
      - sms-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sms-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - sms-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sms-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.example
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/student_management
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-production-jwt-secret-min-32-chars-long}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-production-refresh-secret-min-32-chars}
      CORS_ORIGIN: http://localhost
      LOKI_HOST: http://loki:3100
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sms-network
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:5000/health']
      interval: 30s
      timeout: 5s
      retries: 3

  backend-seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    profiles:
      - seed
    environment:
      MONGODB_URI: mongodb://mongodb:27017/student_management
      JWT_SECRET: seed-secret
      JWT_REFRESH_SECRET: seed-refresh-secret
    command: node dist/utils/seed.js
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - sms-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    container_name: sms-frontend
    restart: unless-stopped
    networks:
      - sms-network

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: sms-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
      - frontend
    networks:
      - sms-network

  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: sms-prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - sms-network

  grafana:
    image: grafana/grafana:11.2.0
    container_name: sms-grafana
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - sms-network

  loki:
    image: grafana/loki:3.1.0
    container_name: sms-loki
    restart: unless-stopped
    ports:
      - '3100:3100'
    volumes:
      - ./logging/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - sms-network

  promtail:
    image: grafana/promtail:3.1.0
    container_name: sms-promtail
    restart: unless-stopped
    volumes:
      - ./logging/promtail-config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - sms-network

volumes:
  mongodb_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  sms-network:
    driver: bridge
